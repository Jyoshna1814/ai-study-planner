<!DOCTYPE html>
<html>
<head>
  <title>AI Study Planner</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="/icon.png">
<link rel="apple-touch-icon" href="/icon.png">
<meta name="theme-color" content="#4b4f9c">
</head>

<body>

<div class="container">

  <h1>📚 AI Smart Study Planner</h1>

  <div id="authBox">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>
  </div>

  <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

  <hr>

  <h2>Add Subject</h2>

  <input id="subjectInput" placeholder="Subject name">
  <input id="difficultyInput" type="number" placeholder="Difficulty (1-5)">
  <input id="weightageInput" type="number" placeholder="Weightage (%)">
  <button onclick="addSubject()">Add</button>

  <ul id="subjectList"></ul>

  <hr>

  <h2>AI Study Plan</h2>

  <input id="examDate" type="date">
  <input id="studyHours" placeholder="Hours per day">

  <button onclick="generateTimetable()">Generate AI Timetable</button>
  <div class="dashboard-grid">

  <div class="stats-card">
    <h3>📅 Today Plan</h3>
    <div id="planResult"></div>
  </div>

  <div class="stats-card">
    <h3>📈 Progress</h3>
    <div style="width:100%;background:#ddd;border-radius:10px;">
      <div id="progressBar"
      style="width:0%;color:white;padding:5px;border-radius:10px;">
        0%
      </div>
    </div>
  </div>

  <div class="stats-card chart-card">
    <h3>📊 Subject Analysis</h3>
    <canvas id="progressChart"></canvas>
  </div>

  <div class="stats-card">
    <h3>⏱ Pomodoro Timer</h3>
    <h1 id="timer">25:00</h1>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

</div>

<hr>

<script src="script.js"></script>

</body>
</html>
