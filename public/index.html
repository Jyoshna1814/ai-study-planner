<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>📘 AI Smart Study Planner</h1>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">
            <h2>Progress</h2>
            <p id="progress">0%</p>
        </div>

        <div class="card">
            <h2>Days Left</h2>
            <p id="daysLeft">0</p>
        </div>

        <div class="card">
            <h2>Total Subjects</h2>
            <p id="totalSubjects">0</p>
        </div>

        <div class="card">
            <h2>Total Study Hours</h2>
            <p id="totalHours">0</p>
        </div>

        <div class="card">
            <h2>Badges</h2>
            <p id="badges">No badges yet</p>
        </div>

    </div>

    <hr>

    <!-- AI PLANNER INPUT -->
    <h2>🧠 AI Planner</h2>

    <div id="subjects-container">
        <!-- Subjects will be added here -->
    </div>

    <button onclick="addSubject()">➕ Add Subject</button>
    <button onclick="generatePlan()">⚡ Generate AI Plan</button>

    <hr>

    <!-- OUTPUT -->
    <h2>📅 Generated Study Plan</h2>
    <div id="output"></div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
