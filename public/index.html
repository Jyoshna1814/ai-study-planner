<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOP HEADER -->
    <header class="top-bar">
        <h1>AI Smart Study Planner</h1>
    </header>

    <!-- MAIN DASHBOARD -->
    <div class="container">

        <!-- GREETING -->
        <section class="card">
            <h2>Good Morning 👋</h2>
            <p>Let's study smart today</p>
        </section>

        <!-- STREAK + PROGRESS -->
        <section class="dashboard-grid">
            <div class="card">
                <h3 id="streakCount">5 Day Streak 🔥</h3>
                <p>Consistency</p>
            </div>

            <div class="card">
                <h3>Tasks</h3>
                <p id="taskSummary">0 Today</p>
            </div>

            <div class="card">
                <h3>Study</h3>
                <p>2h 30m</p>
            </div>

            <div class="card progress-card">
                <div id="progressCircle">0%</div>
            </div>
        </section>

        <!-- TASK HISTORY -->
        <section class="card">
            <h3>Today's Tasks</h3>
            <div id="taskList"></div>
        </section>

        <!-- AI FORM -->
        <section class="card">
            <h2>🧠 AI Study Plan Generator</h2>

            <input type="text" id="subject" placeholder="Enter Subject">

            <input type="text" id="task" placeholder="Enter Task">

            <input type="date" id="examDate">

            <input type="number" id="studyHours" placeholder="Available Study Hours">

            <input type="number" id="weightage" placeholder="Subject Weightage (1-100)">

            <input type="number" id="difficulty" placeholder="Difficulty Level (1-5)">

            <button onclick="generatePlan()">Generate Study Plan</button>
        </section>

        <!-- GENERATED PLAN OUTPUT -->
        <section id="planOutput" class="card">
            <h3>Your AI Plan will appear here</h3>
        </section>

        <!-- RESET BUTTON -->
        <section class="card">
            <button onclick="resetPlanner()">Reset Planner</button>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
