<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Study Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <h2>Good Morning 👋</h2>
    <p>Let's study smart today</p>
  </div>

  <!-- Stats Card -->
  <div class="card stats">
    <div>
      <h3>5 Day Streak 🔥</h3>
      <p>Consistency</p>
    </div>

    <div class="progress-circle">
      <span>78%</span>
    </div>
  </div>

  <!-- Small Cards -->
  <div class="row">
    <div class="card small">
      <h3>Tasks</h3>
      <p>4/6 Today</p>
    </div>

    <div class="card small">
      <h3>Study</h3>
      <p>2h 30m</p>
    </div>
  </div>

  <!-- Task List -->
  <div class="tasks">
    <h3>Today's Tasks</h3>

    <div class="task">
      <span>📘 Math Assignment</span>
      <input type="checkbox">
    </div>

    <div class="task">
      <span>📖 Read History</span>
      <input type="checkbox">
    </div>

    <div class="task">
      <span>🧪 Science Quiz</span>
      <input type="checkbox" checked>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button>🏠</button>
    <button>📅</button>
    <button>⏱</button>
    <button>📊</button>
    <button>🏆</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
